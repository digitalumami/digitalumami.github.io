<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Umami - Blog</title>
    <link rel="icon" href="assets/images/logo.ico" type="x-icon">
    <link rel="stylesheet" href="https://use.typekit.net/jsx5cbs.css">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>
    <!-- Background -->
    <div class="background-image" style="background-color: #000;"></div>

    <!-- Bokeh Effect -->
    <div class="bokeh-container">
        <div class="bokeh bokeh-1"></div>
        <div class="bokeh bokeh-2"></div>
        <div class="bokeh bokeh-3"></div>
        <div class="bokeh bokeh-4"></div>
        <div class="bokeh bokeh-5"></div>
    </div>

    <!-- Header -->
    <header>
        <a href="index.html" class="logo-link">
            <img src="assets/images/logo.png" alt="Digital Umami" class="logo" id="logo"
                onerror="this.onerror=null; this.src='assets/images/logo.png';">
        </a>
        <nav class="header-nav">
            <a href="index.html" class="nav-link">Home</a>
            <a href="blog.html" class="nav-link active">Blog</a>
        </nav>
    </header>

    <!-- Main Content -->
    <div class="main-container">
        <div class="blog-container" id="blog-posts-container">
            <div style="text-align: center; color: rgba(255, 255, 255, 0.6); font-size: 1.2rem; padding: 40px 0;">Loading blog posts...</div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div style="display: flex; gap: 5%; align-items: center;">
            <a href="mailto:games@digitalumami.co.uk" class="footer-email">games@digitalumami.co.uk</a>
        </div>
        <div class="footer-buttons">
            <a href="privacy-policy.html" class="footer-btn">Privacy Policy</a>
        </div>
    </footer>

    <script>
        // Logo placeholder - replace with actual logo upload
        document.getElementById('logo').addEventListener('error', function () {
            this.style.display = 'none';
            const header = document.querySelector('header');
            const logoText = document.createElement('div');
            logoText.textContent = 'Digital Umami';
            logoText.style.color = 'white';
            logoText.style.fontSize = '1.5rem';
            logoText.style.fontWeight = '700';
            header.appendChild(logoText);
        });

        // Helper function to parse markdown links, bold, and italic formatting
        function parseMarkdown(text) {
            let html = text;
            
            // Replace markdown links: [Text](URL) -> <a href="URL" target="_blank" rel="noopener noreferrer">Text</a>
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
            
            // Replace markdown bold: **Text** -> <strong>Text</strong>
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            
            // Replace markdown emphasis/italic: *Text* -> <em>Text</em>
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            
            return html;
        }

        // Fetch and render blog posts from posts.json
        fetch('assets/data/posts.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json();
            })
            .then(posts => {
                const container = document.getElementById('blog-posts-container');
                container.innerHTML = ''; // Clear loading message

                if (!posts || posts.length === 0) {
                    container.innerHTML = '<div style="text-align: center; color: rgba(255, 255, 255, 0.6); font-size: 1.2rem; padding: 40px 0;">No posts found.</div>';
                    return;
                }

                posts.forEach(post => {
                    const article = document.createElement('article');
                    article.className = 'blog-post';

                    // Create header
                    const header = document.createElement('header');
                    header.className = 'blog-post-header';

                    const title = document.createElement('h2');
                    title.className = 'blog-post-title';
                    title.textContent = post.title;

                    const meta = document.createElement('div');
                    meta.className = 'blog-post-meta';

                    const date = document.createElement('span');
                    date.className = 'blog-post-date';
                    date.textContent = post.date;

                    const tag = document.createElement('span');
                    tag.className = 'blog-post-tag';
                    tag.textContent = post.tag;

                    meta.appendChild(date);
                    meta.appendChild(tag);
                    header.appendChild(title);
                    header.appendChild(meta);

                    // Create content
                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'blog-post-content';

                    post.content.forEach(paragraphText => {
                        const p = document.createElement('p');
                        p.innerHTML = parseMarkdown(paragraphText);
                        contentDiv.appendChild(p);
                    });

                    article.appendChild(header);
                    article.appendChild(contentDiv);
                    container.appendChild(article);
                });
            })
            .catch(error => {
                console.error('Error fetching blog posts:', error);
                const container = document.getElementById('blog-posts-container');
                container.innerHTML = '<div style="text-align: center; color: #ff70a5; font-size: 1.2rem; padding: 40px 0;">Error loading blog posts. Please try again later.</div>';
            });
    </script>
</body>

</html>
