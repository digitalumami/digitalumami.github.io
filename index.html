<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Umami</title>
    <link rel="icon" href="assets/images/logo.ico" type="x-icon">   
    <link rel="stylesheet" href="https://use.typekit.net/jsx5cbs.css">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/mailer_styles.css">
</head>
<body>
    <!-- Background -->
    <div class="background-image" style="background-color: #000;"></div>
    
    <!-- Bokeh Effect -->
    <div class="bokeh-container">
        <div class="bokeh bokeh-1"></div>
        <div class="bokeh bokeh-2"></div>
        <div class="bokeh bokeh-3"></div>
        <div class="bokeh bokeh-4"></div>
        <div class="bokeh bokeh-5"></div>
    </div>

    <!-- Header -->
    <header>
        <img src="assets/images/logo.png" alt="Digital Umami" class="logo" id="logo" 
             onerror="this.onerror=null; this.src='assets/images/logo.png';">
    </header>

    <!-- Main Content -->
    <div class="main-container">
        <div class="nav-container">
            <div class="nav-box">
                <h1><img src="assets/images/amc/gamelogo.png" alt="Animal Mystery Crew" class="gamelogo" onerror="this.onerror=null; this.src='assets/images/amc/gamelogo.png';"></h1>
                <p>Crack quirky cases in Animal Mystery Crew! Join the adventure and solve mysteries in this charming puzzle game.
                </br>
                </br>
                </p>
                <div class="cta" style="margin-top:18px;">
                    <a href="amc.html" class="signup-btn">Animal Mystery Crew</a>
                </div>
            </div>
            <div class="nav-box">
                <h1><img src="assets/images/gmbl/gamelogo.png" alt="Gamble Inc." class="gamelogo" onerror="this.onerror=null; this.src='assets/images/gmbl/gamelogo.png';"></h1>
                <p>Experience the thrill of Gamble Inc.! Dive into exciting challenges and strategic gameplay.
                </br>
                </br>
                </p>
                <div class="cta" style="margin-top:18px;">
                    <a href="gmbl.html" class="signup-btn">Gamble Inc.</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div style="display: flex; gap: 5%; align-items: center;">
            <a href="mailto:games@digitalumami.co.uk" class="footer-email">games@digitalumami.co.uk</a>
        </div>
        <div class="footer-buttons">
            <a href="privacy-policy.html" class="footer-btn">Privacy Policy</a>
        </div>
    </footer>

    <script>
        // Logo placeholder - replace with actual logo upload
        document.getElementById('logo').addEventListener('error', function() {
            this.style.display = 'none';
            const header = document.querySelector('header');
            const logoText = document.createElement('div');
            logoText.textContent = 'Digital Umami';
            logoText.style.color = 'white';
            logoText.style.fontSize = '1.5rem';
            logoText.style.fontWeight = '700';
            header.appendChild(logoText);
        });
    </script>
</body>
</html>
